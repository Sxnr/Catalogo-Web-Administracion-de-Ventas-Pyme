<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA CENTRAL | LIMIT BRAKE WEAR</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-body { background: #050505; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .panel-container { max-width: 1200px; margin: auto; display: none; }
        .seccion-admin { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        h2 { font-family: 'Orbitron'; color: var(--cian); font-size: 1.2em; border-bottom: 1px solid #333; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; }
        th { background: #000; color: #666; text-align: left; padding: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #222; vertical-align: middle; }
        .btn-confirmar { background: #25d366; color: black; border: none; padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-eliminar { background: var(--rojo); color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; display: inline-block; }
        .conf { background: #2ecc71; color: black; }
        .input-stock { background: #000; border: 1px solid #333; color: var(--cian); padding: 5px; border-radius: 4px; width: 50px; text-align: center; }
        .btn-update { background: var(--cian); color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body class="admin-body">

    <div id="login-screen" style="text-align:center; margin-top:100px;">
        <h1 style="font-family:'Orbitron'">ACCESO RESTRINGIDO</h1>
        <input type="password" id="pass" placeholder="CÓDIGO DE ACCESO" style="padding:15px; background:#111; border:1px solid var(--cian); color:white; text-align:center; border-radius:8px;">
        <br><br>
        <button onclick="verificarAcceso()" class="btn-add" style="width:200px;">INGRESAR</button>
    </div>

    <div id="main-panel" class="panel-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>CENTRO de CONTROL de ENVÍOS</h2>
            <button onclick="exportarExcel()" style="background:#3498db; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">📥 EXPORTAR EXCEL</button>
        </div>
        
        <div class="seccion-admin">
            <h3>ÓRDENES PENDIENTES DE VALIDACIÓN</h3>
            <table>
                <thead>
                    <tr>
                        <th>Cliente / Contacto</th>
                        <th>Dirección / Ref</th>
                        <th>Artículos</th>
                        <th>Total</th>
                        <th>Gestión</th>
                    </tr>
                </thead>
                <tbody id="tabla-ordenes"></tbody>
            </table>
        </div>

        <div class="seccion-admin">
            <h3>ESTADO DEL ARSENAL (STOCK REAL)</h3>
            <div id="admin-inventory-list"></div>
            <button class="btn-update" onclick="actualizarStockGlobal()">SINCRONIZAR INVENTARIO</button>
        </div>
    </div>

    <script>
        const productosRef = [
            { id: 1, nombre: "Void Stealth" },
            { id: 2, nombre: "Neural Link" },
            { id: 3, nombre: "Titan Frame" }
        ];   

        const CLAVE_MAESTRA = "123"; 

        function verificarAcceso() {
            const input = document.getElementById('pass').value;
            if (input === CLAVE_MAESTRA) {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('main-panel').style.display = "block";
                renderAdmin();
            } else { alert("ACCESO DENEGADO"); }
        }

        function renderAdmin() {
            const stockBase = { 1:{"M":2,"L":2}, 2:{"M":1,"L":1}, 3:{"M":2,"L":1} };
            let stock = JSON.parse(localStorage.getItem('stockLimitBrake')) || stockBase;
            const ordenes = JSON.parse(localStorage.getItem('historialOrdenes')) || [];
            const tabla = document.getElementById('tabla-ordenes');
            
            if (!tabla) return;

            tabla.innerHTML = ordenes.map((o, index) => `
                <tr>
                    <td>
                        <strong>${o.envio.nombre}</strong><br>
                        <small>${o.envio.rut}</small><br>
                        <span style="color:var(--cian); font-weight:bold;">${o.envio.tel}</span>
                    </td>
                    <td>
                        ${o.envio.dir}<br>
                        <strong>${o.envio.com}</strong><br>
                        <small style="color:#888;">Ref: ${o.envio.ref || 'N/A'}</small>
                    </td>
                    <td>${o.items.map(i => i.nombre + ' ('+i.talla+')').join('<br>')}</td>
                    <td><strong>${o.total}</strong><br><small>${o.envio.correo}</small></td>
                    <td>
                        <div style="display:flex; flex-direction:column;">
                            ${o.confirmado ? '<span class="status-badge conf">PAGADO</span>' : `<button class="btn-confirmar" onclick="confirmarPedido(${index})">CONFIRMAR PAGO</button>`}
                            <button class="btn-confirmar" style="background:#f1c40f; color: black;" onclick="generarEtiqueta(${index})">🏷️ ETIQUETA</button>
                            <button class="btn-eliminar" onclick="borrarOrden(${index})">🗑️ ELIMINAR</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            const invList = document.getElementById('admin-inventory-list');
            invList.innerHTML = `<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px; margin-top:20px;">
                ${productosRef.map(p => `
                    <div style="background:#000; padding:15px; border-radius:10px; border:1px solid #222; text-align:center;">
                        <h4 style="color:var(--cian); font-size:0.9em;">${p.nombre}</h4>
                        <div style="display:flex; justify-content:center; gap:10px;">
                            <span>M: <input type="number" value="${stock[p.id].M}" id="stk-${p.id}-M" class="input-stock"></span>
                            <span>L: <input type="number" value="${stock[p.id].L}" id="stk-${p.id}-L" class="input-stock"></span>
                        </div>
                    </div>`).join('')}</div>`;
        }

        // --- LAS FUNCIONES QUE FALTABAN ---

        function confirmarPedido(index) {
            let ordenes = JSON.parse(localStorage.getItem('historialOrdenes'));
            if(confirm("¿Confirmas que recibiste el pago?")) {
                ordenes[index].confirmado = true;
                localStorage.setItem('pagoAprobado', 'true'); 
                localStorage.setItem('historialOrdenes', JSON.stringify(ordenes));
                renderAdmin();
            }
        }

        function borrarOrden(index) {
            if(confirm("¿Estás seguro de eliminar esta orden del historial?")) {
                let ordenes = JSON.parse(localStorage.getItem('historialOrdenes'));
                ordenes.splice(index, 1);
                localStorage.setItem('historialOrdenes', JSON.stringify(ordenes));
                renderAdmin();
            }
        }

        function actualizarStockGlobal() {
            let nuevoStock = { 1:{"M":0,"L":0}, 2:{"M":0,"L":0}, 3:{"M":0,"L":0} };
            productosRef.forEach(p => {
                nuevoStock[p.id].M = parseInt(document.getElementById(`stk-${p.id}-M`).value) || 0;
                nuevoStock[p.id].L = parseInt(document.getElementById(`stk-${p.id}-L`).value) || 0;
            });
            localStorage.setItem('stockLimitBrake', JSON.stringify(nuevoStock));
            alert("✅ STOCK ACTUALIZADO EN LA TIENDA");
            renderAdmin();
        }

        function exportarExcel() {
            let ordenes = JSON.parse(localStorage.getItem('historialOrdenes')) || [];
            if (ordenes.length === 0) return alert("No hay datos");
            let csvContent = "data:text/csv;charset=utf-8,Nombre,RUT,Correo,Telefono,Direccion,Comuna,Referencia,Articulos,Total,Fecha\n";
            ordenes.forEach(o => {
                let articulos = o.items.map(i => `${i.nombre} (${i.talla})`).join(" | ");
                csvContent += `${o.envio.nombre},${o.envio.rut},${o.envio.correo},${o.envio.tel},${o.envio.dir},${o.envio.com},${(o.envio.ref || "N/A").replace(/,/g, " ")},${articulos},${o.total},${o.fecha}\n`;
            });
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "ordenes_LBW.csv");
            document.body.appendChild(link);
            link.click();
        }

        function generarEtiqueta(index) {
            const o = JSON.parse(localStorage.getItem('historialOrdenes'))[index];
            const ventana = window.open('', '', 'width=800,height=600');
            ventana.document.write(`<html><body style="font-family:Arial; padding:40px; border:5px solid black;">
                <h1 style="text-align:center;">LIMIT BRAKE WEAR</h1>
                <hr>
                <p><strong>DESTINATARIO:</strong> ${o.envio.nombre.toUpperCase()}</p>
                <p><strong>RUT:</strong> ${o.envio.rut}</p>
                <p><strong>TELÉFONO:</strong> ${o.envio.tel}</p>
                <p><strong>DIRECCIÓN:</strong> ${o.envio.dir}, ${o.envio.com}</p>
                <p><strong>REF:</strong> ${o.envio.ref || 'N/A'}</p>
                <hr>
                <p><strong>ARTÍCULOS:</strong> ${o.items.map(i => i.nombre + " (" + i.talla + ")").join(', ')}</p>
                <script>window.print();<\/script></body></html>`);
            ventana.document.close();
        }
    </script>
</body>
</html>
